<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Splash Demo</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
  }

  /* SPLASH SCREEN */
  #splash {
    position: fixed;
    inset: 0;
    background: #0d0d0d;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    opacity: 1;
    transition: opacity 0.8s ease;
  }

  #splash-logo {
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 20px;
    letter-spacing: 1px;
  }

  #splash-loader {
    width: 50px;
    height: 50px;
    border: 6px solid #444;
    border-top-color: #00c8ff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  #splash.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  /* APP CONTENT */
  #app {
    display: none;
    padding: 40px;
    text-align: center;
  }

  #app h1 {
    font-size: 28px;
    margin-bottom: 10px;
  }

  #app p {
    font-size: 18px;
    color: #555;
  }
</style>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div id="splash-logo">MFA Feasibility Platform</div>
  <div id="splash-loader"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <h1>Welcome to the MFA Feasibility Platform</h1>
  <p>The splash screen has finished loading.</p>
</div>

<script>
  // SPLASH SCREEN LOGIC
  document.addEventListener("DOMContentLoaded", () => {
    const splash = document.getElementById("splash");
    const app = document.getElementById("app");

    setTimeout(() => {
      splash.classList.add("fade-out");

      setTimeout(() => {
        splash.style.display = "none";
        app.style.display = "block";
      }, 800);
    }, 1200); // splash duration
  });
</script>

</body>
</html>
